<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hill Climb Clone - Versión Optimizada Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            overflow: hidden;
            touch-action: none;
        }
        #menu, #game-container, #game-over {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        #game-container, #game-over { display: none; }
        #game-over { background: rgba(0, 0, 0, 0.85); z-index: 10; }
        canvas {
            background: linear-gradient(#70c5ce, #aad7cd);
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            margin: 10px;
            box-shadow: 0 5px #cc9900;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #cc9900;
        }
        .upgrade-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 8px;
            width: 260px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }
        .ctrl-btn {
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.15);
            border: 4px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.4); }
        #hud {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="letter-spacing: 2px; margin-bottom: 5px;">HILL CLIMB <span style="color:#ffcc00;">CLONE</span></h1>
        <p style="color:#ffcc00; font-weight:bold; margin-top:0; font-size:14px; background:rgba(255,204,0,0.2); padding:5px 10px; border-radius:5px;">MOD: TODO DESBLOQUEADO</p>
        <h2 style="margin-bottom:25px;">Monedas: <span style="color:#ffcc00;">$99,999,999</span></h2>
        
        <div style="display:flex; flex-wrap: wrap; justify-content:center; max-width:900px;">
            <div class="upgrade-box">
                <h3 style="margin:5px 0;">MOTOR</h3>
                <p style="margin:5px 0; color:#aaa;">Nivel: <span id="lvl-motor" style="color:#fff; font-weight:bold;">1</span>/10</p>
                <button class="btn" style="font-size:14px; padding:8px 15px;" onclick="upgrade('motor')">MAXOUT ($0)</button>
            </div>
            <div class="upgrade-box">
                <h3 style="margin:5px 0;">SUSPENSIÓN</h3>
                <p style="margin:5px 0; color:#aaa;">Nivel: <span id="lvl-suspension" style="color:#fff; font-weight:bold;">1</span>/10</p>
                <button class="btn" style="font-size:14px; padding:8px 15px;" onclick="upgrade('suspension')">MAXOUT ($0)</button>
            </div>
            <div class="upgrade-box">
                <h3 style="margin:5px 0;">NEUMÁTICOS</h3>
                <p style="margin:5px 0; color:#aaa;">Nivel: <span id="lvl-ruedas" style="color:#fff; font-weight:bold;">1</span>/10</p>
                <button class="btn" style="font-size:14px; padding:8px 15px;" onclick="upgrade('ruedas')">MAXOUT ($0)</button>
            </div>
        </div>
        
        <button class="btn" style="background:#4CAF50; color:white; box-shadow:0 5px #2E7D32; margin-top:35px; width:250px;" onclick="startGame()">¡INICIAR CARRERA!</button>
    </div>

    <div id="game-over">
        <h1 id="go-reason" style="color:#ff3333; font-size:40px; text-shadow: 0 0 10px rgba(255,0,0,0.5); margin-bottom:5px;">¡CRASH!</h1>
        <p style="font-size:20px; color:#aaa; margin-top:0;">El conductor se ha roto el cuello</p>
        <h2 style="font-size:28px; margin:20px 0;">Distancia: <span id="go-dist" style="color:#ffcc00;">0</span> metros</h2>
        <button class="btn" style="background:#2196F3; color:white; box-shadow:0 5px #0b7dda;" onclick="backToMenu()">Volver al Taller</button>
    </div>

    <div id="game-container">
        <div id="hud">
            Distancia: <span id="hud-dist" style="color:#ffcc00;">0</span>m<br>
            Gasolina: <span id="hud-fuel" style="color:#4CAF50;">100</span>%
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <button class="ctrl-btn" id="btn-brake">FRENAR<br>↺</button>
            <button class="ctrl-btn" id="btn-gas">GAS<br>↻</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Caché de elementos DOM para optimizar rendimiento de CPU
        const domMenu = document.getElementById("menu");
        const domGameContainer = document.getElementById("game-container");
        const domGameOver = document.getElementById("game-over");
        const domGoReason = document.getElementById("go-reason");
        const domGoDist = document.getElementById("go-dist");
        const domHudDist = document.getElementById("hud-dist");
        const domHudFuel = document.getElementById("hud-fuel");

        // Adaptabilidad del tamaño del Canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth > 900 ? 900 : window.innerWidth;
            canvas.height = window.innerHeight > 500 ? 500 : window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Variables de estado del Mod
        let upgrades = { motor: 1, suspension: 1, ruedas: 1 };
        
        let car = {
            x: 100, y: 150, vx: 0, vy: 0,
            angle: 0, vAngle: 0, radius: 15,
            fuel: 100, alive: false, distance: 0
        };

        let keys = { gas: false, brake: false };

        // Configuración de controles táctiles optimizados (Evita scrolls raros en móviles)
        const setupTouchBtn = (id, keyName) => {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; }, { passive: false });
            btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; }, { passive: false });
        };
        setupTouchBtn("btn-gas", "gas");
        setupTouchBtn("btn-brake", "brake");
        
        // Controles de Teclado PC
        window.addEventListener("keydown", (e) => {
            if(e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.gas = true;
            if(e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.brake = true;
        });
        window.addEventListener("keyup", (e) => {
            if(e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.gas = false;
            if(e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.brake = false;
        });

        function upgrade(type) {
            upgrades[type] = 10; 
            document.getElementById(`lvl-${type}`).innerText = "MAX";
        }

        function startGame() {
            domMenu.style.display = "none";
            domGameOver.style.display = "none";
            domGameContainer.style.display = "flex";
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        function backToMenu() {
            car.alive = false;
            domMenu.style.display = "flex";
            domGameOver.style.display = "none";
            domGameContainer.style.display = "none";
        }

        function triggerGameOver(reason) {
            car.alive = false;
            domGoReason.innerText = reason === 'neck' ? "¡CRASH!" : "¡SIN GASOLINA!";
            domGoReason.nextElementSibling.innerText = reason === 'neck' ? "El conductor se ha roto el cuello" : "Te has quedado tirado en mitad de la colina";
            domGoDist.innerText = car.distance;
            domGameOver.style.display = "flex";
        }

        function resetGame() {
            car.x = 100; car.y = 50; car.vx = 0; car.vy = 0;
            car.angle = 0; car.vAngle = 0; car.fuel = 100;
            car.distance = 0; car.alive = true;
        }

        // Generador matemático infinito de colinas
        function getTerrainHeight(x) {
            return canvas.height - 120 
                + Math.sin(x * 0.005) * 60 
                + Math.sin(x * 0.02) * 15 
                + Math.cos(x * 0.001) * 35;
        }

        // Bucle principal optimizado a 60fps reales
        function gameLoop() {
            if (!car.alive) return;

            updatePhysics();
            draw();

            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            let power = 0.12 + (upgrades.motor * 0.025);
            let grip = 0.975 + (upgrades.ruedas * 0.0015);
            let stability = 0.0035 + (upgrades.suspension * 0.001);

            let groundY = getTerrainHeight(car.x);
            let isGrounded = car.y >= groundY - car.radius;

            // Consumo de combustible
            if(car.fuel > 0) {
                car.fuel -= 0.05;
            } else {
                car.fuel = 0;
                keys.gas = false;
            }

            if (isGrounded) {
                car.y = groundY - car.radius;
                car.vy = 0;

                let nextGroundY = getTerrainHeight(car.x + 5);
                let terrainAngle = Math.atan2(nextGroundY - groundY, 5);
                
                car.angle += (terrainAngle - car.angle) * 0.25;

                if (keys.gas) {
                    car.vx += Math.cos(car.angle) * power;
                    car.vy += Math.sin(car.angle) * power;
                }
                if (keys.brake) {
                    car.vx -= Math.cos(car.angle) * (power * 0.7);
                }
                car.vx *= grip;
            } else {
                car.vy += 0.28; // Gravedad
                if (keys.gas) car.vAngle += stability;
                if (keys.brake) car.vAngle -= stability;
                
                car.vAngle *= 0.88;
                car.angle += car.vAngle;
            }

            car.x += car.vx;
            car.y += car.vy;
            car.distance = Math.floor(car.x / 10);

            // Inyección rápida de datos en el HUD
            domHudDist.innerText = car.distance;
            domHudFuel.innerText = Math.floor(car.fuel);
            domHudFuel.style.color = car.fuel > 30 ? "#4CAF50" : "#ff3333";

            // Control de colisiones fatales (Volcarse)
            let currentTerrainAngle = Math.atan2(getTerrainHeight(car.x+1) - getTerrainHeight(car.x), 1);
            if (isGrounded && Math.abs(car.angle - currentTerrainAngle) > Math.PI / 1.7) {
                triggerGameOver('neck');
            }

            // Control de fin de combustible sin movimiento
            if(car.fuel <= 0 && Math.abs(car.vx) < 0.15) {
                triggerGameOver('fuel');
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-car.x + 150, 0); // La cámara sigue al jugador suavemente

            // Dibujar escenario / Colinas infinitas optimizadas
            ctx.beginPath();
            ctx.fillStyle = "#4CAF50";
            let startX = car.x - 200;
            ctx.moveTo(startX, canvas.height);
            for (let x = startX; x < car.x + canvas.width + 100; x += 6) {
                ctx.lineTo(x, getTerrainHeight(x));
            }
            ctx.lineTo(car.x + canvas.width + 100, canvas.height);
            ctx.fill();

            // Gasolineras estratégicas cada 1200 metros
            let fuelStationX = Math.floor(car.x / 1300 + 1) * 1300;
            ctx.fillStyle = "#e50914";
            ctx.fillRect(fuelStationX, getTerrainHeight(fuelStationX) - 45, 22, 45);
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.fillText("GAS", fuelStationX - 2, getTerrainHeight(fuelStationX) - 52);
            
            // Lógica de recarga por proximidad
            if(Math.abs(car.x - fuelStationX) < 35 && Math.abs(car.y - getTerrainHeight(fuelStationX)) < 60) {
                car.fuel = 100;
            }

            // Renderizar el Coche (Chasis y ruedas)
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);
            
            ctx.fillStyle = "#e50914"; // Chasis Rojo Deportivo
            ctx.fillRect(-25, -14, 50, 14); 
            ctx.fillStyle = "rgba(255,255,255,0.7)"; 
            ctx.fillRect(5, -24, 15, 10);   

            // Ruedas texturizadas fijas
            ctx.fillStyle = "#222";
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            
            ctx.beginPath(); ctx.arc(-15, 6, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(15, 6, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            
            ctx.restore();
            ctx.restore();
        }
    </script>
</body>
</html>

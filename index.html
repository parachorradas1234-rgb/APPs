<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hill Mountain Racing XL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #menu, #game-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #game-container { display: none; }
        canvas {
            background: linear-gradient(#70c5ce, #aad7f0);
            width: 100%;
            height: 100%;
        }
        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }
        .btn {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid white;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        
        /* Estilos del Menú de Compras */
        .shop-box {
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            max-width: 80%;
        }
        .options-grid {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .option-card {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #555;
            cursor: pointer;
        }
        .option-card.selected { border-color: #5cf25c; background: #224422; }
        .start-btn {
            background: #5cf25c;
            color: black;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="menu">
        <div class="shop-box">
            <h1>HILL MOUNTAIN RACING</h1>
            <h2 style="color: #ffd700;">MONEDAS: $<span id="coin-count">999,999,999</span></h2>
            
            <h3>SELECCIONA TU VEHÍCULO (¡Todos gratis/desbloqueados!)</h3>
            <div class="options-grid">
                <div class="option-card selected" onclick="selectVehicle('Jeep', this)">🚗 Jeep (Maxed)</div>
                <div class="option-card" onclick="selectVehicle('Monster Truck', this)">🛻 Monster (Maxed)</div>
                <div class="option-card" onclick="selectVehicle('Rover Lunar', this)">🚀 Rover (Maxed)</div>
            </div>

            <h3>SELECCIONA EL PLANETA / PISTA</h3>
            <div class="options-grid">
                <div class="option-card selected" onclick="selectMap('Tierra', this)">⛰️ Campo (Tierra)</div>
                <div class="option-card" onclick="selectMap('Luna', this)">🌑 La Luna (Baja Gravedad)</div>
                <div class="option-card" onclick="selectMap('Marte', this)">🔴 Marte</div>
            </div>

            <button class="start-btn" onclick="startGame()">¡INICIAR CARRERA!</button>
        </div>
    </div>

    <div id="game-container">
        <div class="hud-top">Distancia: <span id="distance">0</span>m</div>
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <div class="btn" id="btn-brake">FRENO</div>
            <div class="btn" id="btn-gas">GAS</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Configuración inicial del juego
        let gameActive = false;
        let selectedVehicle = 'Jeep';
        let selectedMap = 'Tierra';
        
        // Físicas del coche y entorno
        let gravity = 0.2;
        let car = { x: 100, y: 200, vx: 0, vy: 0, angle: 0, vAngle: 0, speed: 0.15 };
        let terrain = [];
        let cameraX = 0;

        // Ajustar tamaño del canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Selección de menú
        function selectVehicle(name, element) {
            selectedVehicle = name;
            clearSelection(element.parentNode);
            element.classList.add('selected');
        }

        function selectMap(name, element) {
            selectedMap = name;
            clearSelection(element.parentNode);
            element.classList.add('selected');
            
            // Cambiar gravedad según el mapa simulado
            if(name === 'Luna') gravity = 0.06;
            else if(name === 'Marte') gravity = 0.12;
            else gravity = 0.2;
        }

        function clearSelection(parent) {
            parent.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
        }

        // Generar colinas (terreno) aleatorias matemáticamente
        function generateTerrain() {
            terrain = [];
            let currentY = canvas.height - 150;
            for (let i = 0; i < 5000; i++) {
                // Crear curvas usando funciones seno
                let frequency = selectedMap === 'Luna' ? 0.01 : 0.02;
                let amplitude = selectedMap === 'Luna' ? 80 : 50;
                currentY = (canvas.height - 150) + Math.sin(i * frequency) * amplitude + Math.cos(i * 0.05) * 20;
                terrain.push(currentY);
            }
        }

        // Inputs (Gas y Freno)
        let isGas = false;
        let isBrake = false;

        document.getElementById('btn-gas').addEventListener('touchstart', () => isGas = true);
        document.getElementById('btn-gas').addEventListener('touchend', () => isGas = false);
        document.getElementById('btn-brake').addEventListener('touchstart', () => isBrake = true);
        document.getElementById('btn-brake').addEventListener('touchend', () => isBrake = false);

        // Iniciar el juego
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            generateTerrain();
            
            // Ajustar rendimiento según vehículo elegido
            if(selectedVehicle === 'Monster Truck') car.speed = 0.25;
            if(selectedVehicle === 'Rover Lunar') car.speed = 0.2;

            gameActive = true;
            gameLoop();
        }

        // Bucle principal del juego (Físicas y Renderizado)
        function gameLoop() {
            if (!gameActive) return;

            // --- 1. ACTUALIZAR FÍSICAS ---
            if (isGas) {
                car.vx += car.speed;
                car.vAngle += 0.005; // El gas inclina el morro hacia arriba en el aire
            }
            if (isBrake) {
                car.vx -= car.speed * 0.5;
                car.vAngle -= 0.005; // El freno lo inclina hacia abajo
            }

            // Aplicar gravedad y fricción simple
            car.vy += gravity;
            car.vx *= 0.98;
            
            car.x += car.vx;
            car.y += car.vy;
            car.angle += car.vAngle;
            car.vAngle *= 0.9; // Fricción de rotación

            // Encontrar la altura del terreno debajo del coche
            let targetIdx = Math.floor(car.x);
            let terrainY = terrain[targetIdx] || canvas.height;

            // Colisión con el suelo
            if (car.y >= terrainY - 20) {
                car.y = terrainY - 20;
                car.vy = 0;
                
                // Adaptar el ángulo del coche a la inclinación del terreno
                let nextY = terrain[targetIdx + 5] || terrainY;
                let groundAngle = Math.atan2(nextY - terrainY, 5);
                car.angle = groundAngle;
            }

            // Seguir con la cámara
            cameraX = car.x - 150;

            // Actualizar HUD
            document.getElementById('distance').innerText = Math.floor(car.x / 10);

            // --- 2. DIBUJAR EN PANTALLA ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar el cielo según el planeta
            if(selectedMap === 'Luna') ctx.fillStyle = '#050508';
            else if(selectedMap === 'Marte') ctx.fillStyle = '#4a2511';
            else ctx.fillStyle = '#aad7f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Terreno
            ctx.fillStyle = selectedMap === 'Luna' ? '#888' : selectedMap === 'Marte' ? '#b25329' : '#659d1f';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let worldX = Math.floor(i + cameraX);
                let groundY = terrain[worldX] || canvas.height;
                ctx.lineTo(i, groundY);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            // Dibujar el Coche (Representación geométrica simple estilo prototipo)
            ctx.save();
            ctx.translate(car.x - cameraX, car.y);
            ctx.rotate(car.angle);
            
            // Cuerpo del coche
            ctx.fillStyle = selectedVehicle === 'Monster Truck' ? 'red' : selectedVehicle === 'Rover Lunar' ? 'white' : 'blue';
            ctx.fillRect(-30, -15, 60, 15);
            ctx.fillStyle = 'cyan'; // Ventana
            ctx.fillRect(0, -25, 20, 10);

            // Ruedas
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.arc(-20, 5, selectedVehicle === 'Monster Truck' ? 14 : 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, 5, selectedVehicle === 'Monster Truck' ? 14 : 8, 0, Math.PI * 2); ctx.fill();

            ctx.restore();

            // Reiniciar si se cae al abismo o se sale del mapa
            if (car.y > canvas.height + 100) {
                alert("¡Coche destruido! Reiniciando...");
                car.x = 100; car.y = 200; car.vx = 0; car.vy = 0; car.angle = 0;
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>

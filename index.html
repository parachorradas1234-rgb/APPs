<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Hill Mountain Racing Prototipo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Bloquea el zoom y scroll nativo del iPhone */
        }
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Menú de Selección */
        #menu {
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 100;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .shop-box {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #38bdf8;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .currency {
            color: #f59e0b;
            font-size: 24px;
            font-weight: bold;
            background: rgba(245, 158, 11, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .section-title {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            margin: 15px 0 8px 0;
            text-align: left;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .option-card {
            background: #1e293b;
            padding: 12px 5px;
            border-radius: 12px;
            border: 2px solid #475569;
            font-size: 13px;
        }
        .option-card.selected {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.2);
        }
        .start-btn {
            background: #10b981;
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            margin-top: 20px;
        }
        
        /* Pantalla de Juego */
        #game-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 10px;
            z-index: 10;
        }
        
        /* Nuevos Controles HTML Superpuestos */
        .controls-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permite clicks pasantes salvo en los botones */
            z-index: 20;
        }
        .touch-btn {
            position: absolute;
            bottom: 30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Activa el toque solo aquí */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid rgba(255, 255, 255, 0.4);
        }
        #btn-brake {
            left: 40px;
            background: rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }
        #btn-gas {
            right: 40px;
            background: rgba(16, 185, 129, 0.4);
            border-color: #10b981;
        }
        #btn-brake:active { background: #ef4444; }
        #btn-gas:active { background: #10b981; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="shop-box">
            <h1>HILL RACING PRO</h1>
            <div class="currency">💰 $<span id="coin-count">999,999,999</span></div>
            
            <div class="section-title">Vehículo (Maxeados)</div>
            <div class="options-grid">
                <div class="option-card selected" onclick="selectVehicle('Jeep', this)">🚗<br>Jeep</div>
                <div class="option-card" onclick="selectVehicle('Monster', this)">🛻<br>Monster</div>
                <div class="option-card" onclick="selectVehicle('Rover', this)">🚀<br>Rover</div>
            </div>

            <div class="section-title">Entorno</div>
            <div class="options-grid">
                <div class="option-card selected" onclick="selectMap('Tierra', this)">⛰️<br>Valle</div>
                <div class="option-card" onclick="selectMap('Luna', this)">🌑<br>Luna</div>
                <div class="option-card" onclick="selectMap('Marte', this)">🔴<br>Marte</div>
            </div>

            <button class="start-btn" onclick="startGame()">EMPEZAR JUEGO</button>
        </div>
    </div>

    <div id="game-container">
        <div class="hud-top">Distancia: <span id="distance">0</span>m</div>
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls-layer">
            <div class="touch-btn" id="btn-brake">FRENAR</div>
            <div class="touch-btn" id="btn-gas">ACELERAR</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameActive = false;
        let selectedVehicle = 'Jeep';
        let selectedMap = 'Tierra';
        
        let gravity = 0.25;
        let car = { x: 150, y: 100, vx: 0, vy: 0, angle: 0, vAngle: 0, speed: 0.25 };
        let terrain = [];
        let cameraX = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function selectVehicle(name, element) {
            selectedVehicle = name;
            clearSelection(element.parentNode);
            element.classList.add('selected');
        }

        function selectMap(name, element) {
            selectedMap = name;
            clearSelection(element.parentNode);
            element.classList.add('selected');
            if(name === 'Luna') gravity = 0.08;
            else if(name === 'Marte') gravity = 0.15;
            else gravity = 0.25;
        }

        function clearSelection(parent) {
            parent.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
        }

        // --- NUEVO TERRENO CON INICIO 100% PLANO ---
        function generateTerrain() {
            terrain = [];
            let baseLine = canvas.height - 200;
            
            for (let i = 0; i < 20000; i++) {
                // Los primeros 3000 pixeles (~300 metros) el terreno es completamente plano
                if (i < 3000) {
                    terrain.push(baseLine);
                } else {
                    // Dificultad progresiva a partir de los 300 metros
                    let distanceFactor = (i - 3000) / 10000; 
                    let difficulty = Math.min(distanceFactor, 1.0); // Máxima dificultad a los 1300m
                    
                    let amplitude = difficulty * 130; // Altura máxima de colinas
                    let frequency = 0.005 + (difficulty * 0.015); // Inclinación de las curvas
                    
                    let y = baseLine + Math.sin(i * frequency) * amplitude + Math.cos(i * 0.03) * (amplitude * 0.2);
                    terrain.push(y);
                }
            }
        }

        // Variables de Control
        let isGas = false;
        let isBrake = false;

        // EVENTOS DE BOTONES (Corregido para iOS usando PointerEvents globales)
        const gasBtn = document.getElementById('btn-gas');
        const brakeBtn = document.getElementById('btn-brake');

        gasBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); isGas = true; });
        gasBtn.addEventListener('pointerup', (e) => { e.preventDefault(); isGas = false; });
        gasBtn.addEventListener('pointercancel', () => { isGas = false; });

        brakeBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); isBrake = true; });
        brakeBtn.addEventListener('pointerup', (e) => { e.preventDefault(); isBrake = false; });
        brakeBtn.addEventListener('pointercancel', () => { isBrake = false; });

        // Soporte adicional para teclado si pruebas en PC
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'd') isGas = true;
            if(e.key === 'ArrowLeft' || e.key === 'a') isBrake = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'd') isGas = false;
            if(e.key === 'ArrowLeft' || e.key === 'a') isBrake = false;
        });

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            if(selectedVehicle === 'Monster') car.speed = 0.35;
            else if(selectedVehicle === 'Rover') car.speed = 0.28;
            else car.speed = 0.25;

            generateTerrain();
            gameActive = true;
            gameLoop();
        }

        function gameLoop() {
            if (!gameActive) return;

            // Físicas del Acelerador y Marcha Atrás / Freno
            if (isGas) {
                car.vx += car.speed;
                car.vAngle += 0.006; // Levanta trompa en el aire
            }
            if (isBrake) {
                car.vx -= car.speed * 0.7; // Freno y marcha atrás
                car.vAngle -= 0.006; // Baja trompa en el aire
            }

            // Gravedad y fricción del suelo/aire
            car.vy += gravity;
            car.vx *= 0.98; 
            
            car.x += car.vx;
            car.y += car.vy;
            car.angle += car.vAngle;
            car.vAngle *= 0.88; 

            // Control de límites para no retroceder al infinito a la izquierda
            if (car.x < 50) { car.x = 50; car.vx = 0; }

            let targetIdx = Math.floor(car.x);
            let terrainY = terrain[targetIdx] || canvas.height;

            // Colisión contra el suelo
            if (car.y >= terrainY - 18) {
                car.y = terrainY - 18;
                car.vy = 0;
                
                // Copiar inclinación del suelo
                let nextY = terrain[targetIdx + 6] || terrainY;
                let groundAngle = Math.atan2(nextY - terrainY, 6);
                car.angle = groundAngle;
            }

            cameraX = car.x - 150;
            document.getElementById('distance').innerText = Math.floor(car.x / 10);

            // --- RENDERIZADO VISUAL ---
            // Cielo
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if(selectedMap === 'Luna') {
                skyGrad.addColorStop(0, '#020617'); skyGrad.addColorStop(1, '#0f172a');
            } else if(selectedMap === 'Marte') {
                skyGrad.addColorStop(0, '#451a03'); skyGrad.addColorStop(1, '#78350f');
            } else {
                skyGrad.addColorStop(0, '#bae6fd'); skyGrad.addColorStop(1, '#e0f2fe');
            }
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Terreno
            ctx.fillStyle = selectedMap === 'Luna' ? '#64748b' : selectedMap === 'Marte' ? '#9a3412' : '#15803d';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let worldX = Math.floor(i + cameraX);
                let groundY = terrain[worldX] || canvas.height;
                ctx.lineTo(i, groundY);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            // Línea de superficie de la pista
            ctx.strokeStyle = selectedMap === 'Luna' ? '#94a3b8' : selectedMap === 'Marte' ? '#ea580c' : '#22c55e';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Dibujar el vehículo
            ctx.save();
            ctx.translate(car.x - cameraX, car.y);
            ctx.rotate(car.angle);
            
            // Cuerpo
            ctx.fillStyle = selectedVehicle === 'Monster' ? '#ef4444' : selectedVehicle === 'Rover' ? '#f8fafc' : '#3b82f6';
            ctx.fillRect(-24, -16, 48, 12);
            
            // Cristal
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.moveTo(0, -16); ctx.lineTo(14, -16); ctx.lineTo(6, -25); ctx.lineTo(-10, -25);
            ctx.closePath(); ctx.fill();

            // Ruedas
            let wRadius = selectedVehicle === 'Monster' ? 14 : 9;
            ctx.fillStyle = '#1e293b';
            ctx.beginPath(); ctx.arc(-16, 2, wRadius, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(16, 2, wRadius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#94a3b8';
            ctx.beginPath(); ctx.arc(-16, 2, wRadius/2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(16, 2, wRadius/2, 0, Math.PI * 2); ctx.fill();

            ctx.restore();

            // Game Over por caída
            if (car.y > canvas.height + 150) {
                alert("¡Vehículo volcado! Reiniciando nivel...");
                car.x = 150; car.y = 100; car.vx = 0; car.vy = 0; car.angle = 0;
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>

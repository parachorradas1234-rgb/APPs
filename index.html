<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hill Mountain Racing Prototipo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Menú de Selección Estilizado */
        #menu {
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 10;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .shop-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #38bdf8;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 28px;
            margin-top: 0;
            color: #f1f5f9;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .currency {
            color: #f59e0b;
            font-size: 24px;
            font-weight: bold;
            background: rgba(245, 158, 11, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .section-title {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 8px 0;
            text-align: left;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .option-card {
            background: #1e293b;
            padding: 12px 5px;
            border-radius: 12px;
            border: 2px solid #475569;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .option-card.selected {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }
        .start-btn {
            background: #10b981;
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
        }
        
        /* Contenedor del Juego */
        #game-container {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* HUD Superior */
        .hud-top {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 22px;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 10px;
            pointer-events: none;
        }
        
        /* Controles Táctiles estilo Consola */
        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            pointer-events: none; /* Deja pasar clicks si es necesario */
        }
        .btn {
            width: 110px;
            height: 110px;
            background: rgba(15, 23, 42, 0.6);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Activa el toque solo en los botones */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            touch-action: none;
        }
        #btn-brake { border-color: #ef4444; background: rgba(239, 68, 68, 0.2); }
        #btn-gas { border-color: #10b981; background: rgba(16, 185, 129, 0.2); }
        #btn-brake:active { background: rgba(239, 68, 68, 0.6); }
        #btn-gas:active { background: rgba(16, 185, 129, 0.6); }
    </style>
</head>
<body>

    <div id="menu">
        <div class="shop-box">
            <h1>HILL RACING PRO</h1>
            <div class="currency">💰 $<span id="coin-count">999,999,999</span></div>
            
            <div class="section-title">Vehículo (Maxeados)</div>
            <div class="options-grid">
                <div class="option-card selected" onclick="selectVehicle('Jeep', this)">🚗<br>Jeep</div>
                <div class="option-card" onclick="selectVehicle('Monster', this)">🛻<br>Monster</div>
                <div class="option-card" onclick="selectVehicle('Rover', this)">🚀<br>Rover</div>
            </div>

            <div class="section-title">Entorno</div>
            <div class="options-grid">
                <div class="option-card selected" onclick="selectMap('Tierra', this)">⛰️<br>Valle</div>
                <div class="option-card" onclick="selectMap('Luna', this)">🌑<br>Luna</div>
                <div class="option-card" onclick="selectMap('Marte', this)">🔴<br>Marte</div>
            </div>

            <button class="start-btn" onclick="startGame()">EMPEZAR JUEGO</button>
        </div>
    </div>

    <div id="game-container">
        <div class="hud-top">Distancia: <span id="distance">0</span>m</div>
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <div class="btn" id="btn-brake">FRENO</div>
            <div class="btn" id="btn-gas">GAS</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameActive = false;
        let selectedVehicle = 'Jeep';
        let selectedMap = 'Tierra';
        
        let gravity = 0.25;
        let car = { x: 100, y: 100, vx: 0, vy: 0, angle: 0, vAngle: 0, speed: 0.22 };
        let terrain = [];
        let cameraX = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function selectVehicle(name, element) {
            selectedVehicle = name;
            clearSelection(element.parentNode);
            element.classList.add('selected');
        }

        function selectMap(name, element) {
            selectedMap = name;
            clearSelection(element.parentNode);
            element.classList.add('selected');
            if(name === 'Luna') gravity = 0.08;
            else if(name === 'Marte') gravity = 0.15;
            else gravity = 0.25;
        }

        function clearSelection(parent) {
            parent.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
        }

        // --- DIFICULTAD PROGRESIVA AQUÍ ---
        // Genera el terreno dinámicamente haciendo que sea más difícil según la distancia (i)
        function generateTerrain() {
            terrain = [];
            let baseLine = canvas.height - 180;
            
            for (let i = 0; i < 10000; i++) {
                // Conforme 'i' avanza, las colinas se vuelven más altas (amplitud) y más juntas/empinadas (frecuencia)
                let difficultyFactor = Math.min(i / 1500, 1.0); // Se estabiliza en la dificultad máxima a los 1500 metros
                
                let amplitude = 10 + (difficultyFactor * 110); // Empieza en 10px de altura, sube hasta 120px
                let frequency = 0.005 + (difficultyFactor * 0.025); // Se vuelve más empinado e irregular
                
                let y = baseLine + Math.sin(i * frequency) * amplitude + Math.cos(i * 0.04) * (amplitude * 0.2);
                terrain.push(y);
            }
        }

        let isGas = false;
        let isBrake = false;

        // --- SOLUCIÓN PARA BOTONES EN IPHONE ---
        function setupButton(id, pressCallback, releaseCallback) {
            const btn = document.getElementById(id);
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Evita bugs de Safari e interferencias de zoom
                pressCallback();
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                releaseCallback();
            }, { passive: false });
        }

        setupButton('btn-gas', () => isGas = true, () => isGas = false);
        setupButton('btn-brake', () => isBrake = true, () => isBrake = false);

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Valores según vehículo
            if(selectedVehicle === 'Monster') car.speed = 0.32;
            else if(selectedVehicle === 'Rover') car.speed = 0.26;
            else car.speed = 0.22;

            generateTerrain();
            gameActive = true;
            gameLoop();
        }

        function gameLoop() {
            if (!gameActive) return;

            // Físicas del acelerador y freno
            if (isGas) {
                car.vx += car.speed;
                car.vAngle += 0.006; 
            }
            if (isBrake) {
                car.vx -= car.speed * 0.6;
                car.vAngle -= 0.006;
            }

            car.vy += gravity;
            car.vx *= 0.97; // Fricción ambiental
            
            car.x += car.vx;
            car.y += car.vy;
            car.angle += car.vAngle;
            car.vAngle *= 0.88; 

            let targetIdx = Math.floor(car.x);
            let terrainY = terrain[targetIdx] || canvas.height;

            // Detección de suelo
            if (car.y >= terrainY - 18) {
                car.y = terrainY - 18;
                car.vy = 0;
                
                let nextY = terrain[targetIdx + 6] || terrainY;
                let groundAngle = Math.atan2(nextY - terrainY, 6);
                car.angle = groundAngle;
            }

            cameraX = car.x - 120;
            document.getElementById('distance').innerText = Math.floor(car.x / 10);

            // --- DISEÑO VISUAL MEJORADO ---
            // 1. Fondo con Degradado
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if(selectedMap === 'Luna') {
                skyGrad.addColorStop(0, '#020617'); skyGrad.addColorStop(1, '#0f172a');
            } else if(selectedMap === 'Marte') {
                skyGrad.addColorStop(0, '#451a03'); skyGrad.addColorStop(1, '#78350f');
            } else {
                skyGrad.addColorStop(0, '#bae6fd'); skyGrad.addColorStop(1, '#e0f2fe');
            }
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Dibujar Terreno con Borde Superior de Color Distinto
            ctx.fillStyle = selectedMap === 'Luna' ? '#64748b' : selectedMap === 'Marte' ? '#9a3412' : '#15803d';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i < canvas.width; i++) {
                let worldX = Math.floor(i + cameraX);
                let groundY = terrain[worldX] || canvas.height;
                ctx.lineTo(i, groundY);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            // Línea superior del pasto/suelo
            ctx.strokeStyle = selectedMap === 'Luna' ? '#94a3b8' : selectedMap === 'Marte' ? '#ea580c' : '#22c55e';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 3. Renderizar el Coche con más detalle estético
            ctx.save();
            ctx.translate(car.x - cameraX, car.y);
            ctx.rotate(car.angle);
            
            // Sombra del chasis
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(-22, -6, 44, 10);

            // Cuerpo del coche
            ctx.fillStyle = selectedVehicle === 'Monster' ? '#ef4444' : selectedVehicle === 'Rover' ? '#f8fafc' : '#3b82f6';
            ctx.fillRect(-24, -16, 48, 12);
            
            // Cabina / Ventana
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.moveTo(0, -16);
            ctx.lineTo(14, -16);
            ctx.lineTo(6, -26);
            ctx.lineTo(-10, -26);
            ctx.closePath();
            ctx.fill();

            // Ruedas Estilizadas (Negras con centro gris)
            let wheelRadius = selectedVehicle === 'Monster' ? 13 : 8;
            
            ctx.fillStyle = '#1e293b'; // Neumático
            ctx.beginPath(); ctx.arc(-16, 2, wheelRadius, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(16, 2, wheelRadius, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = '#94a3b8'; // Rin
            ctx.beginPath(); ctx.arc(-16, 2, wheelRadius/2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(16, 2, wheelRadius/2, 0, Math.PI * 2); ctx.fill();

            ctx.restore();

            // Pantalla de derrota si te sales hacia abajo
            if (car.y > canvas.height + 150) {
                alert("¡Vehículo destruido! Inténtalo de nuevo.");
                car.x = 100; car.y = 100; car.vx = 0; car.vy = 0; car.angle = 0;
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
